x-client-common: &client-common
  build:
    context: ../../..
    dockerfile: testing/environments/dev-integration/Dockerfile.client
    args:
      CODEX_NPM_VERSION: "${CAG_CODEX_NPM_VERSION:-0.120.0}"
  environment: &client-environment
    GATEWAY_URL: "ws://gateway:8080/ws/client"
    CODEX_RUNTIME_MODE: "${CAG_CLIENT_RUNTIME_MODE:-appserver}"
    CODEX_BIN: "${CAG_CODEX_BIN:-codex}"
    HOME: /home/appuser
    OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  depends_on:
    gateway:
      condition: service_healthy

services:
  gateway:
    build:
      context: ../../..
      dockerfile: testing/environments/dev-integration/Dockerfile.gateway
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      GATEWAY_API_KEY: "${GATEWAY_API_KEY}"
    ports:
      - "${CAG_GATEWAY_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  client-default:
    <<: *client-common
    environment:
      <<: *client-environment
      MACHINE_NAME: "${CAG_MACHINE_NAME_DEFAULT:-Dev Integration Client}"
    volumes:
      - client-default-state:/home/appuser/.code-agent-gateway

  client-hostname:
    <<: *client-common
    hostname: "${CAG_HOSTNAME_FALLBACK_NAME:-hostname-fallback-client}"
    volumes:
      - client-hostname-state:/home/appuser/.code-agent-gateway

  client-not-agent:
    <<: *client-common
    environment:
      <<: *client-environment
      MACHINE_NAME: "${CAG_MACHINE_NAME_NOT_AGENT:-Not Agent}"
    volumes:
      - client-not-agent-state:/home/appuser/.code-agent-gateway

  console:
    build:
      context: ../../..
      dockerfile: testing/environments/dev-integration/Dockerfile.console
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /ws
    ports:
      - "${CAG_CONSOLE_PORT:-14173}:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  client-default-state:
  client-hostname-state:
  client-not-agent-state:
