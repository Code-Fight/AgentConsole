services:
  gateway:
    build:
      context: ../..
      dockerfile: testenv/local-stack/Dockerfile.gateway
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "${CAG_GATEWAY_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  client:
    build:
      context: ../..
      dockerfile: testenv/local-stack/Dockerfile.client
    environment:
      MACHINE_ID: "${CAG_MACHINE_ID:-machine-01}"
      GATEWAY_URL: "ws://gateway:8080/ws/client"
      CODEX_RUNTIME_MODE: "${CAG_CLIENT_RUNTIME_MODE:-fake}"
      CODEX_BIN: "${CAG_CODEX_BIN:-codex}"
    depends_on:
      gateway:
        condition: service_healthy

  console:
    build:
      context: ../..
      dockerfile: testenv/local-stack/Dockerfile.console
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /ws
    ports:
      - "${CAG_CONSOLE_PORT:-14173}:80"
    depends_on:
      gateway:
        condition: service_healthy

